name: cli-release

on:
  workflow_dispatch:
  push:
    tags:
      - "cli-v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: build-${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            bin_name: af
            ext: tar.gz
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            bin_name: af
            ext: tar.gz
          - os: macos-15-intel
            target: x86_64-apple-darwin
            bin_name: af
            ext: tar.gz
          - os: macos-15
            target: aarch64-apple-darwin
            bin_name: af
            ext: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bin_name: af.exe
            ext: zip

    defaults:
      run:
        working-directory: cli

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Zig for linux-musl cross build
        if: contains(matrix.target, 'linux-musl')
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.13.0

      - name: Install cargo-zigbuild
        if: contains(matrix.target, 'linux-musl')
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-zigbuild

      - name: Build (linux-musl)
        if: contains(matrix.target, 'linux-musl')
        run: cargo zigbuild --release --target ${{ matrix.target }}

      - name: Verify linux-musl binary runs
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: target/${{ matrix.target }}/release/af --help > /dev/null

      - name: Build (native)
        if: ${{ !contains(matrix.target, 'linux-musl') }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          test -f "skills/autofish-control/SKILL.md"
          VERSION="${GITHUB_REF_NAME:-cli-dev}"
          ARCHIVE="${VERSION}-${{ matrix.target }}.tar.gz"
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${{ matrix.bin_name }}" "dist/${{ matrix.bin_name }}"
          cp "skills/autofish-control/SKILL.md" dist/SKILL.md
          cp README.md dist/README.md
          cp ../LICENSE dist/LICENSE
          tar -C dist -czf "${ARCHIVE}" .
          rm -rf dist

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (-Not (Test-Path "skills/autofish-control/SKILL.md")) { throw "SKILL.md not found" }
          $Version = if ($env:GITHUB_REF_NAME) { $env:GITHUB_REF_NAME } else { "cli-dev" }
          $Archive = "$Version-${{ matrix.target }}.zip"
          New-Item -ItemType Directory -Path dist | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.bin_name }}" "dist/${{ matrix.bin_name }}"
          Copy-Item "skills/autofish-control/SKILL.md" "dist/SKILL.md"
          Copy-Item "README.md" "dist/README.md"
          Copy-Item "../LICENSE" "dist/LICENSE"
          Compress-Archive -Path "dist/*" -DestinationPath $Archive
          Remove-Item -Recurse -Force dist

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: cli-${{ matrix.target }}
          path: cli/${{ github.ref_name }}-${{ matrix.target }}.${{ matrix.ext }}
          if-no-files-found: error

  smoke-npm:
    if: startsWith(github.ref, 'refs/tags/')
    name: smoke-npm-${{ matrix.target }}
    needs: build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            platform_package: linux-x64-musl
            bin_name: af
            ext: tar.gz
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
            platform_package: linux-arm64-musl
            bin_name: af
            ext: tar.gz
          - os: macos-15-intel
            target: x86_64-apple-darwin
            platform_package: darwin-x64
            bin_name: af
            ext: tar.gz
          - os: macos-15
            target: aarch64-apple-darwin
            platform_package: darwin-arm64
            bin_name: af
            ext: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            platform_package: win32-x64-msvc
            bin_name: af.exe
            ext: zip
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Download artifact
        uses: actions/download-artifact@v7
        with:
          name: cli-${{ matrix.target }}
          path: artifacts

      - name: Extract binary (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          ARCHIVE="$(find artifacts -type f -name "${GITHUB_REF_NAME}-${{ matrix.target }}.${{ matrix.ext }}" | head -n1)"
          if [[ -z "$ARCHIVE" ]]; then
            echo "Artifact for target '${{ matrix.target }}' not found"
            exit 1
          fi
          TMPDIR="$(mktemp -d)"
          tar -xzf "$ARCHIVE" -C "$TMPDIR"
          BINARY_PATH="$TMPDIR/${{ matrix.bin_name }}"
          WORKROOT="$RUNNER_TEMP/af-npm-smoke"
          VERSION="${GITHUB_REF_NAME#cli-v}"
          node cli/npm/scripts/prepare-smoke-workroot.mjs \
            --workroot "$WORKROOT" \
            --version "$VERSION" \
            --platform-package "${{ matrix.platform_package }}" \
            --binary "$BINARY_PATH"
          PLATFORM_TARBALL="$(cd "$WORKROOT/platforms/${{ matrix.platform_package }}" && npm pack | tail -n1)"
          cp "$WORKROOT/platforms/${{ matrix.platform_package }}/$PLATFORM_TARBALL" "$WORKROOT/meta/vendor/$PLATFORM_TARBALL"
          META_TARBALL="$(cd "$WORKROOT/meta" && npm pack | tail -n1)"
          npm install -g "$WORKROOT/meta/$META_TARBALL"
          PREFIX="$(npm prefix -g)"
          "$PREFIX/bin/af" --help > /dev/null

      - name: Extract binary (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $archive = Get-ChildItem -Path artifacts -Recurse -Filter "${env:GITHUB_REF_NAME}-${{ matrix.target }}.${{ matrix.ext }}" | Select-Object -First 1
          if (-not $archive) { throw "Artifact for target '${{ matrix.target }}' not found" }
          $tmpdir = Join-Path $env:RUNNER_TEMP "af-smoke-artifact"
          if (Test-Path $tmpdir) { Remove-Item -Recurse -Force $tmpdir }
          New-Item -ItemType Directory -Path $tmpdir | Out-Null
          Expand-Archive -Path $archive.FullName -DestinationPath $tmpdir -Force
          $binary = Join-Path $tmpdir "${{ matrix.bin_name }}"
          $workroot = Join-Path $env:RUNNER_TEMP "af-npm-smoke"
          $version = $env:GITHUB_REF_NAME.Substring(5)
          node cli/npm/scripts/prepare-smoke-workroot.mjs `
            --workroot $workroot `
            --version $version `
            --platform-package "${{ matrix.platform_package }}" `
            --binary $binary
          $platformDir = Join-Path $workroot "platforms/${{ matrix.platform_package }}"
          Push-Location $platformDir
          $platformTarball = (npm pack | Select-Object -Last 1).Trim()
          Pop-Location
          Copy-Item (Join-Path $platformDir $platformTarball) (Join-Path $workroot "meta/vendor/$platformTarball")
          $metaDir = Join-Path $workroot "meta"
          Push-Location $metaDir
          $metaTarball = (npm pack | Select-Object -Last 1).Trim()
          Pop-Location
          npm install -g (Join-Path $metaDir $metaTarball)
          $prefix = npm prefix -g
          & (Join-Path $prefix "af.cmd") --help | Out-Null

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build, smoke-npm]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/**/*

  npm-publish:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build, smoke-npm, release]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts

      - name: Prepare npm packages from release artifacts
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#cli-v}"
          if [[ "$VERSION" == "$GITHUB_REF_NAME" ]]; then
            echo "Expected tag format cli-v<version>, got: $GITHUB_REF_NAME"
            exit 1
          fi
          DIST_TAG="latest"
          if [[ "$VERSION" == *"-rc."* ]] || [[ "$VERSION" == *"-rc"* ]]; then
            DIST_TAG="rc"
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "DIST_TAG=$DIST_TAG" >> "$GITHUB_ENV"

          WORKROOT="$RUNNER_TEMP/af-npm"
          rm -rf "$WORKROOT"
          mkdir -p "$WORKROOT/platforms"
          cp -R cli/npm/meta "$WORKROOT/meta"
          cp -R cli/npm/platforms/. "$WORKROOT/platforms"
          find "$WORKROOT" -name package.json -type f -exec sed -i "s/__VERSION__/$VERSION/g" {} +

          extract_binary() {
            local target="$1"
            local outdir="$2"
            local bin_name="$3"
            local archive
            archive="$(find artifacts -type f -name "${GITHUB_REF_NAME}-${target}.*" | head -n1)"
            if [[ -z "$archive" ]]; then
              echo "Artifact for target '$target' not found"
              exit 1
            fi
            local tmp
            tmp="$(mktemp -d)"
            case "$archive" in
              *.tar.gz) tar -xzf "$archive" -C "$tmp" ;;
              *.zip) unzip -q "$archive" -d "$tmp" ;;
              *)
                echo "Unsupported archive type: $archive"
                exit 1
                ;;
            esac
            cp "$tmp/$bin_name" "$outdir/$bin_name"
            rm -rf "$tmp"
          }

          extract_binary "x86_64-unknown-linux-musl" "$WORKROOT/platforms/linux-x64-musl/bin" "af"
          extract_binary "aarch64-unknown-linux-musl" "$WORKROOT/platforms/linux-arm64-musl/bin" "af"
          extract_binary "x86_64-apple-darwin" "$WORKROOT/platforms/darwin-x64/bin" "af"
          extract_binary "aarch64-apple-darwin" "$WORKROOT/platforms/darwin-arm64/bin" "af"
          extract_binary "x86_64-pc-windows-msvc" "$WORKROOT/platforms/win32-x64-msvc/bin" "af.exe"

          chmod +x "$WORKROOT/platforms/linux-x64-musl/bin/af" \
            "$WORKROOT/platforms/linux-arm64-musl/bin/af" \
            "$WORKROOT/platforms/darwin-x64/bin/af" \
            "$WORKROOT/platforms/darwin-arm64/bin/af"

          echo "WORKROOT=$WORKROOT" >> "$GITHUB_ENV"

      - name: Publish platform packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          for pkg in \
            linux-x64-musl \
            linux-arm64-musl \
            darwin-x64 \
            darwin-arm64 \
            win32-x64-msvc
          do
            echo "Publishing @memohjs/af-$pkg@$VERSION ($DIST_TAG)"
            (cd "$WORKROOT/platforms/$pkg" && npm publish --access public --tag "$DIST_TAG")
          done

      - name: Publish meta package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          echo "Publishing @memohjs/af@$VERSION ($DIST_TAG)"
          (cd "$WORKROOT/meta" && npm publish --access public --tag "$DIST_TAG")
